version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urbanmove_backend

    environment:
      # Database configuration - AWS RDS PostgreSQL
      # This is the PRIMARY method for ECS/Docker deployments
      DATABASE_URL: "postgresql://urbanmove:urbanmove123@urbanmove-db.cr6m40awq563.eu-north-1.rds.amazonaws.com:5432/urbanmove"
      
      # AWS configuration
      ENVIRONMENT: production
      AWS_REGION: eu-north-1
      
      # API configuration
      API_KEY: urbanmove123
      SECRET_KEY: dev-secret-key-change-in-production
      ALLOWED_ORIGINS: "*"

    ports:
      - "8000:8000"

    volumes:
      - ./app:/app/app

    command: >
      sh -c "
        echo '================================================'
        echo 'Starting UrbanMove Backend'
        echo 'Database: AWS RDS PostgreSQL (RDS only)'
        echo '================================================' &&
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s