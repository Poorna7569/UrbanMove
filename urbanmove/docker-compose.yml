version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urbanmove_backend

    environment:
      ENVIRONMENT: production
      SECRET_KEY: dev-secret-key-change-in-production
      ALLOWED_ORIGINS: "*"
      AWS_REGION: eu-north-1
      API_KEY: urbanmove123

    ports:
      - "8000:8000"

    volumes:
      - ./app:/app/app

    command: >
      sh -c "
        echo 'Starting backend with RDS (credentials from AWS Secrets Manager)...' &&
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s